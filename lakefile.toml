name = "categorical-logic"
defaultTargets = ["CategoricalLogic"]

[leanOptions]
# From Harmonic's header
autoImplicit = false
relaxedAutoImplicit = false

maxHeartbeats = 8000000
maxRecDepth = 4000
synthInstance.maxHeartbeats = 20000
synthInstance.maxSize = 128
grind.warning = false

# Pretty-printer settings
pp.unicode.fun = true # pretty-prints `fun a ↦ b`

# Harmonic sets this to true, but it is annoying
pp.fullNames = false
# Harmonic sets this to true, but it is annoying
pp.structureInstances = false
pp.coercions.types = true
pp.funBinderTypes = true
pp.letVarTypes = true
pp.piBinderTypes = true

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[require]]
scope = "leanprover"
name = "doc-gen4"

[[lean_lib]]
name = "CategoricalLogic"
